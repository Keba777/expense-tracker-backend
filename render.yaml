databases:
  - name: expense-tracker-db
    plan: free
    databaseName: expense_tracker
    user: expense_user

services:
  - type: redis
    name: expense-tracker-redis
    plan: free
    maxmemoryPolicy: noeviction

  - type: web
    name: expense-tracker-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    plan: free
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_NAME
        value: ExpenseTracker
      - key: DATABASE_URL
        fromDatabase:
          name: expense-tracker-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: expense-tracker-redis
          property: connectionString
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRY_MINUTES
        value: 15
      - key: JWT_REFRESH_EXPIRY_DAYS
        value: 30
      - key: CORS_ORIGINS
        sync: false
      - key: RATE_LIMIT_MAX
        value: 100
      - key: RATE_LIMIT_EXPIRY_SECONDS
        value: 60
      - key: DB_MAX_OPEN_CONNS
        value: 25
      - key: DB_MAX_IDLE_CONNS
        value: 10
      - key: DB_CONN_MAX_LIFETIME
        value: 300
